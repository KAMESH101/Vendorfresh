



<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buy Product - Vendor Fresh</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .product-details {
      max-width: 600px;
      margin: 2rem auto;
      background: #03C04A;
      padding: 1rem 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      color: #fff;
    }
    .product-details img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .product-details h2 {
      margin-bottom: 0.5rem;
      color: #2d7a2d;
    }
    .product-details p {
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Vendor Fresh</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="farmers.html">Farmers</a>
      <a href="village-heads.html">Village Heads</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main>
    <section class="product-details" id="product-details">
      <h2>Loading product details…</h2>
    </section>
    <p style="text-align:center;"><a href="products.html">Back to Products</a></p>
  </main>

  <footer>
    &copy; 2025 Vendor Fresh. All rights reserved.
  </footer>

  <script>
    const productData = {
      "basmati-rice": {
        name: "Basmati Rice",
        price: "₹120 / kg",
        desc: "Premium long-grain basmati rice, aromatic and fluffy.",
        farmer: "Aman Singh, Punjab",
        image: "images/Basmati.webp"
      },
      "assam-tea-leaves": {
        name: "Assam Tea Leaves",
        price: "₹80 / 250g",
        desc: "Fresh black tea leaves, hand-plucked from Assam gardens.",
        farmer: "Rashmi Barman, Assam",
        image: "images/assam-green-tea-leaves.png"
      },
      "alphonso-mangoes": {
        name: "Alphonso Mangoes",
        price: "₹300 / dozen",
        desc: "Juicy, sweet Alphonso mangoes at peak ripeness.",
        farmer: "Shantanu Patil, Ratnagiri, Maharashtra",
        image: "images/Alponso mago.jpg"
      },
      "fresh-okra": {
        name: "Fresh Okra (Ladyfinger)",
        price: "₹55 / kg",
        desc: "Crisp okra, ideal for sabzi and curries.",
        farmer: "Mangesh Pawar, Nagpur, Maharashtra",
        image: "images/Lady_Finger-okra.webp"
      },
      "coriander-seeds": {
        name: "Coriander Seeds",
        price: "₹30 / 100g",
        desc: "Whole, sun-dried coriander for fresh ground masala.",
        farmer: "Aarti Reddy, Warangal, Telangana",
        image: "images/Coriander leaves.jpg"
      },
      "green-chillies": {
        name: "Green Chillies",
        price: "₹38 / 100g",
        desc: "Whole, fresh green Chillies for spicy food.",
        farmer: "Neena Reddy, Gundur, Telangana",
        image: "images/green-chilli-200-g-product-images-o590003533-p590003533-0-202408070949.webp"
      },
      "red-onions": {
        name: "Red Onions",
        price: "₹38 / 100g",
        desc: "Whole, fresh Red onions for wholesome food.",
        farmer: "Mangal Singh, Dholakpur, Punjab",
        image: "images/onions.webp"
      },
      "pumpkins": {
        name: "Pumpkins",
        price: "₹38 / 100g",
        desc: "Whole, fresh Pumpkins for good healthy body.",
        farmer: "Neena Reddy, Matheran, Maharashtra",
        image: "images/Pumpkins.webp"
      },
   
    };

    function getQueryParam(param) {
      const params = new URLSearchParams(window.location.search);
      return params.get(param);
    }

    function displayProductDetails() {
  const productId = getQueryParam('product');
  const container = document.getElementById('product-details');

  if (!productId || !productData[productId]) {
    container.innerHTML = '<h2>Product not found</h2>';
    return;
  }

  const product = productData[productId];
  container.innerHTML = `
    <img src="${product.image}" alt="${product.name}" />
    <h2>${product.name}</h2>
    <p><strong>Price: </strong>${product.price}</p>
    <p>${product.desc}</p>
    <p><em>By ${product.farmer}</em></p>
    <button class="buy-btn" id="proceedToBuy">Proceed to Buy</button>
  `;

  // Attach event listener AFTER button is added to DOM
  const proceedButton = document.getElementById('proceedToBuy');
  proceedButton.addEventListener('click', () => {
    const url = `payment.html?name=${encodeURIComponent(product.name)}&price=${encodeURIComponent(product.price)}&farmer=${encodeURIComponent(product.farmer)}`;
    window.location.href = url;
  });
}

document.addEventListener('DOMContentLoaded', displayProductDetails);

  </script>
</body>
</html>
